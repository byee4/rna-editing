# ==========================================
# General Execution Parameters
# ==========================================
threads: 8

# ==========================================
# Experimental Design
# ==========================================
# conditions and samples are derived at runtime from the samplesheet CSV.
samplesheet: "samplesheet.csv"
aligners:
  - star
  - bwa
  - hisat2

# ==========================================
# References and Annotations
# ==========================================
references:
  fasta: "/tscc/projects/ps-yeolab3/bay001/annotations/GRCh38/GRCh38_no_alt_analysis_set_GCA_000001405.15.fasta"
  star_index: "/tscc/projects/ps-yeolab3/bay001/annotations/GRCh38/star_2_7_gencode40_sjdb/"
  hisat2_index: "/tscc/projects/ps-yeolab3/bay001/annotations/GRCh38/hisat2"
  gtf: "/tscc/projects/ps-yeolab3/bay001/annotations/GRCh38/gencode_v40/gencode.v40.annotation.gtf"
  rmsk: "/tscc/projects/ps-yeolab3/bay001/codebase/rna-editing/data/rmsk.txt.gz"  # downloaded from https://hgdownload.soe.ucsc.edu/goldenPath/hg38/database/
  dbsnp: "/tscc/projects/ps-yeolab3/bay001/codebase/rna-editing/data/snp151CodingDbSnp.txt.gz"  # downloaded from https://hgdownload.soe.ucsc.edu/goldenPath/hg38/database/snp151CodingDbSnp.txt.gz
  simple_repeat_src: "/tscc/projects/ps-yeolab3/bay001/codebase/rna-editing/data/simpleRepeat.txt"  # raw UCSC download
  simple_repeat: "/tscc/projects/ps-yeolab3/bay001/codebase/rna-editing/data/simpleRepeat.merge.bed"  # generated by generate_simple_repeat rule
  alu_bed: "/tscc/projects/ps-yeolab3/bay001/codebase/rna-editing/data/hg38.alu.bed"  # generated by generate_alu_bed rule
  rediportal_hg38: "/tscc/nfs/home/bay001/projects/codebase/rna-editing/data/TABLE1_hg38_v3.txt.gz"  # https://rediportal.cloud.ba.infn.it/atlas/download.html
  db_path: "/tscc/projects/ps-yeolab3/bay001/codebase/rna-editing/data/dbRNA-Editing"  # generated by build_dbrna_editing
  marine_annotation_bed: "/tscc/projects/ps-yeolab3/bay001/codebase/rna-editing/data/marine_annotation.bed"  # generated by generate_marine_annotation

# ==========================================
# Container Images (Apptainer/Singularity)
# ==========================================
singularity_image_dir: "/tscc/projects/ps-yeolab3/bay001/codebase/rna-editing/singularity"
containers:
  fastx: "/tscc/projects/ps-yeolab3/bay001/codebase/rna-editing/singularity/fastx.sif"
  star: "/tscc/projects/ps-yeolab3/bay001/codebase/rna-editing/singularity/star.sif"
  picard: "/tscc/projects/ps-yeolab3/bay001/codebase/rna-editing/singularity/picard.sif"
  reditools: "/tscc/projects/ps-yeolab3/bay001/codebase/rna-editing/singularity/reditools2.sif"
  sprint: "/tscc/projects/ps-yeolab3/bay001/codebase/rna-editing/singularity/sprint.sif"
  wgs: "/tscc/projects/ps-yeolab3/bay001/codebase/rna-editing/singularity/wgs.sif"
  red_ml: "/tscc/projects/ps-yeolab3/bay001/codebase/rna-editing/singularity/red_ml.sif"
  jacusa2: "/tscc/projects/ps-yeolab3/bay001/codebase/rna-editing/singularity/jacusa2.sif"
  morales_downstream: "/tscc/projects/ps-yeolab3/bay001/codebase/rna-editing/singularity/morales_downstream.sif"
  redinet: "/tscc/nfs/home/bay001/projects/codebase/rna-editing/singularity/redinet.sif"

# ==========================================
# WGS Samples for HEK293T SNP Database
# ==========================================
# Used by rules/wgs.smk to generate data/dbRNA-Editing/HEK293T_hg38.bed.
# Each entry maps sample name → list of FASTQ paths (R1 [R2 optional]).
# The sample name becomes the prefix of the output BED file.
#
# IMPORTANT: Without this key, _WGS_DB_FILES will be empty and build_dbrna_editing
# will not run. The downstream rule multiple_analysis.done requires the three JSON
# databases (HEK293T_hg38_clean.json, REDIportal.json, Alu_GRCh38.json) to exist
# at references.db_path — so omitting wgs_samples will cause a runtime failure when
# downstream scripts try to load those files.
wgs_samples:
  HEK293T:
    - "/tscc/nfs/home/bay001/projects/codebase/rna-editing/data/small_examples/gene_APP_GAPDH/HEK293_WGS_SRR10129632_R1.fastq.gz"
    - "/tscc/nfs/home/bay001/projects/codebase/rna-editing/data/small_examples/gene_APP_GAPDH/HEK293_WGS_SRR10129632_R2.fastq.gz"

# Path to the Benchmark-of-RNA-Editing-Detection-Tools/Downstream directory.
downstream_scripts_dir: "/tscc/nfs/home/bay001/projects/codebase/rna-editing/pipelines/Morales_et_al/Benchmark-of-RNA-Editing-Detection-Tools/Downstream"

# Scratch directory for mktemp -d inside containers (must be writable lustre path)
tmpdir: "/tscc/lustre/ddn/scratch/bay001/"

# ==========================================
# Tool Specific Parameters
# ==========================================
params:
  fastx_trimmer:
    quality: 33
    length: 130
  star:
    sjdbOverhang: 129
    map_quality: 20
  bcftools:
    max_depth: 10000
    map_quality: 20
    base_quality: 20
  red_ml:
    p_value: 0.5
  jacusa2:
    pileup_filter: "D"
  reditools3:
    strand: 0
    map_quality: 20
    base_quality: 30
  redinet:
    reditools_strand: 0
    map_quality: 20
    base_quality: 20
    min_cov: 10
    cov_threshold: 50
    agfreq_threshold: 0.01
    min_ag_subs: 3
  marine:
    strandedness: 0
    paired_end: true
# ==========================================
# Visualization / Trackhub Parameters
# ==========================================
visualization:
  # Tools to include in BigBed and comparison matrices (jacusa2 excluded: per-aligner, not per-sample)
  tools:
    - reditools
    - reditools3
    - sprint
    - red_ml
    - bcftools
    - redinet
    - marine
  bigwig_binsize: 10          # bp bin size for bamCoverage (CPM-normalised)
  ucsc_assembly: hg38
  hub_name: "Morales_et_al RNA Editing"
  hub_email: "user@example.com"
