verbose: false
printshellcmds: true
notemp: true
latency: 60
skip-script-cleanup: true
retries: 2
nolock: true
default-storage-provider: none
rerun-triggers: mtime
keep-going: true
# In Snakemake 8+, use-conda/use-singularity/use-envmodules were replaced by
# software-deployment-method (--sdm). Use "apptainer" for Singularity/Apptainer containers.
software-deployment-method:
  - apptainer
  - conda
  - env-modules
conda-prefix: "/tscc/nfs/home/$USER/scratch/snakeconda/"
conda-frontend: conda
rerun-incomplete: true
jobs: 30
executor: slurm
default-resources:
  slurm_partition: "condo"
# slurm_partition: "gold"  # to use our nodes
  slurm_account: "csd792"
  runtime: 30
  mem_mb: 20000
  slurm_extra: "--qos=condo"
# slurm_extra: "--qos=hcg-csd792"  # to use our nodes
apptainer-args: "--bind /tscc/projects/,/tscc/nfs/home/,/tscc/lustre/,/cm,/etc/passwd"
show-failed-logs: true
slurm-logdir: "slurm_logs"
# add --exclude=NODE (e.g. tscc-1-18) to slurm extra to remove problematic nodes.
